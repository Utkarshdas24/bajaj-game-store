# Dynamically set Access-Control-Allow-Origin based on the requesting origin
map $http_origin $cors_origin {
    default "";
    "~^https?://([a-z0-9-]+\.)*bajajlifeinsurance\.com$" $http_origin;
    "~^https?://([a-z0-9-]+\.)*bajajallianz\.com$"       $http_origin;
    "~^https?://([a-z0-9-]+\.)*bajajallianzlife\.com$"    $http_origin;
}

server {
    listen 80;
    server_name localhost;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Redirect bare /gamification to /gamification/
    location = /gamification {
        return 301 /gamification/;
    }

    # Angular app served under /gamification/
    location /gamification/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /gamification/index.html;
    }

    # Cache static assets but require revalidation
    location /gamification/assets/ {
        alias /usr/share/nginx/html/assets/;
        add_header Cache-Control "no-cache, must-revalidate";
        expires 0;

        # Security headers (must repeat — nginx drops server-level add_header when location has its own)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "frame-ancestors 'self' https://balicuat.bajajlifeinsurance.com https://www.bajajlifeinsurance.com https://bajajlifeinsurance.com;" always;
    }

    # Game bundles with SPA fallback per game
    location ~ ^/gamification/assets/games/(?<game>[^/]+)/(?<req>.*)$ {
        alias /usr/share/nginx/html/assets/games/$game/$req;
        try_files "" /gamification/assets/games/$game/index.html;
        
        add_header Cache-Control "no-cache, must-revalidate";
        expires 0;

        # CORS — reflect the requesting origin if it matches an allowed domain
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept" always;

        # Security headers (must repeat — nginx drops server-level add_header when location has its own)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "frame-ancestors 'self' https://balicuat.bajajlifeinsurance.com https://www.bajajlifeinsurance.com https://bajajlifeinsurance.com;" always;
    }

    # Don't cache index.html
    location = /gamification/index.html {
        alias /usr/share/nginx/html/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;

        # Security headers (must repeat — nginx drops server-level add_header when location has its own)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "frame-ancestors 'self' https://balicuat.bajajlifeinsurance.com https://www.bajajlifeinsurance.com https://bajajlifeinsurance.com;" always;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "frame-ancestors 'self' https://balicuat.bajajlifeinsurance.com https://www.bajajlifeinsurance.com https://bajajlifeinsurance.com;" always;
}
